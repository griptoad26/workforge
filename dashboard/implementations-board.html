<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implementations Board</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        /* Add new implementation */
        .add-section {
            background: rgba(255,215,0,0.1);
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .add-section h3 { color: #ffd700; margin-bottom: 15px; }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        input, textarea, select {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            color: #eee;
            font-size: 1rem;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        
        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        
        button:hover { transform: scale(1.02); }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            color: #888;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .filter-btn.active {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
            color: #ffd700;
        }
        
        /* Implementation cards */
        .impl-list { display: flex; flex-direction: column; gap: 15px; }
        
        .impl-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }
        
        .impl-card.starred {
            border-color: #ffd700;
            background: rgba(255,215,0,0.05);
        }
        
        .impl-card .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .impl-card .title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .impl-card .star-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        
        .impl-card .star-btn.starred { color: #ffd700; }
        .impl-card .star-btn:not(.starred) { color: #444; }
        
        .impl-card .description {
            color: #ccc;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .impl-card .meta {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #666;
        }
        
        .impl-card .tag {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            padding: 3px 10px;
            border-radius: 12px;
        }
        
        .impl-card .pin-btn {
            background: none;
            border: 1px solid #444;
            color: #666;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .impl-card .pin-btn.pinned {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        /* Empty state */
        .empty {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        
        /* Auto-refresh indicator */
        .refresh-indicator {
            text-align: center;
            color: #444;
            font-size: 0.8rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐ Implementations Board</h1>
        <p class="subtitle">Track accomplishments, features, and milestones</p>
        
        <!-- Add new -->
        <div class="add-section">
            <h3>➕ Add Implementation</h3>
            <div class="input-group">
                <input type="text" id="implTitle" placeholder="Title (e.g., Created task extraction hook)">
                <select id="implCategory">
                    <option value="feature">Feature</option>
                    <option value="fix">Bug Fix</option>
                    <option value="improvement">Improvement</option>
                    <option value="docs">Documentation</option>
                    <option value="infrastructure">Infrastructure</option>
                </select>
            </div>
            <div class="input-group">
                <textarea id="implDesc" placeholder="Description..." rows="2"></textarea>
            </div>
            <button onclick="addImplementation()">Add Implementation</button>
        </div>
        
        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" onclick="filter('all')">All</button>
            <button class="filter-btn" onclick="filter('starred')">⭐ Starred</button>
            <button class="filter-btn" onclick="filter('pinned')">📌 Pinned</button>
            <button class="filter-btn" onclick="filter('feature')">Features</button>
            <button class="filter-btn" onclick="filter('fix')">Fixes</button>
            <button class="filter-btn" onclick="filter('infrastructure')">Infrastructure</button>
        </div>
        
        <!-- List -->
        <div class="impl-list" id="implList"></div>
        
        <div class="refresh-indicator">
            Auto-refreshes every 30 seconds • <span id="lastUpdate"></span>
        </div>
    </div>
    
    <script>
        const HUB_URL = 'http://100.112.11.35:8090';
        let implementations = [];
        let currentFilter = 'all';
        
        // Load implementations from Hub
        async function loadImplementations() {
            try {
                // For now, use tasks with 'implementation' tag
                const resp = await fetch(HUB_URL + '/api/tasks');
                const data = await resp.json();
                
                implementations = (data.tasks || []).map(t => ({
                    id: t.id,
                    title: t.title,
                    description: t.description || '',
                    category: t.category || 'feature',
                    starred: t.tags?.includes('starred') || false,
                    pinned: t.tags?.includes('pinned') || false,
                    date: t.created || t.updated
                }));
                
                render();
                document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error(e);
            }
        }
        
        function render() {
            const list = document.getElementById('implList');
            let filtered = implementations;
            
            if (currentFilter === 'starred') {
                filtered = implementations.filter(i => i.starred);
            } else if (currentFilter === 'pinned') {
                filtered = implementations.filter(i => i.pinned);
            } else if (currentFilter !== 'all') {
                filtered = implementations.filter(i => i.category === currentFilter);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty">No implementations yet. Add one above!</div>';
                return;
            }
            
            // Sort: pinned first, then starred, then by date
            filtered.sort((a, b) => {
                if (a.pinned !== b.pinned) return b.pinned - a.pinned;
                if (a.starred !== b.starred) return b.starred - a.starred;
                return new Date(b.date) - new Date(a.date);
            });
            
            list.innerHTML = filtered.map(impl => `
                <div class="impl-card ${impl.starred ? 'starred' : ''}">
                    <div class="header">
                        <div class="title">${impl.title}</div>
                        <button class="star-btn ${impl.starred ? 'starred' : ''}" onclick="toggleStar('${impl.id}')">
                            ${impl.starred ? '⭐' : '☆'}
                        </button>
                    </div>
                    <div class="description">${impl.description}</div>
                    <div class="meta">
                        <span class="tag">${impl.category}</span>
                        <span>${new Date(impl.date).toLocaleDateString()}</span>
                        <button class="pin-btn ${impl.pinned ? 'pinned' : ''}" onclick="togglePin('${impl.id}')">
                            ${impl.pinned ? '📌 Pinned' : '📌 Pin'}
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function filter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }
        
        async function addImplementation() {
            const title = document.getElementById('implTitle').value;
            const desc = document.getElementById('implDesc').value;
            const category = document.getElementById('implCategory').value;
            
            if (!title) return;
            
            try {
                await fetch(HUB_URL + '/api/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: title,
                        description: desc,
                        category: category,
                        project: 'IMPLEMENTATIONS',
                        tags: ['implementation', category]
                    })
                });
                
                document.getElementById('implTitle').value = '';
                document.getElementById('implDesc').value = '';
                loadImplementations();
            } catch (e) {
                alert('Error: ' + e);
            }
        }
        
        async function toggleStar(id) {
            const impl = implementations.find(i => i.id === id);
            if (!impl) return;
            
            // Toggle via tags - would need API support
            impl.starred = !impl.starred;
            render();
        }
        
        async function togglePin(id) {
            const impl = implementations.find(i => i.id === id);
            if (!impl) return;
            
            impl.pinned = !impl.pinned;
            render();
        }
        
        // Initial load
        loadImplementations();
        
        // Auto-refresh
        setInterval(loadImplementations, 30000);
    </script>
</body>
</html>
