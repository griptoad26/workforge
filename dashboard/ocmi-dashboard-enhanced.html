<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 OCMI Dashboard - Enhanced</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-hover: #22222e;
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-gradient: linear-gradient(135deg, #00d4ff 0%, #7c3aed 50%, #ec4899 100%);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --border-color: rgba(255,255,255,0.08);
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .logo-text {
            font-size: 2.2rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .filter-select {
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn {
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--bg-hover); }
        .btn-primary {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-success { border-color: var(--success); color: var(--success); }
        .btn-danger { border-color: var(--error); color: var(--error); }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            transition: all 0.2s;
        }
        .task-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent-primary);
        }
        .task-item.completed {
            opacity: 0.6;
        }
        .task-item.completed .task-title {
            text-decoration: line-through;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
        }
        .task-priority {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .priority-high { background: rgba(239,68,68,0.2); color: var(--error); }
        .priority-medium { background: rgba(245,158,11,0.2); color: var(--warning); }
        .priority-low { background: rgba(34,197,94,0.2); color: var(--success); }
        
        .task-content { flex: 1; }
        .task-title {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .task-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .task-item:hover .task-actions { opacity: 1; }
        
        .action-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
        }
        .action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
        }
        .modal h3 { margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 12px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .tab:hover { background: var(--bg-hover); }
        .tab.active {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-text">🧠 OCMI Dashboard</div>
            <p style="color: var(--text-secondary); margin-top: 8px;">Enhanced Task Management</p>
        </header>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="openTasks" style="color: var(--warning);">0</div>
                <div class="stat-label">Open</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="inProgressTasks" style="color: var(--info);">0</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedTasks" style="color: var(--success);">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>
        
        <!-- Toolbar -->
        <div class="toolbar">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search tasks...">
            
            <select class="filter-select" id="statusFilter">
                <option value="all">All Status</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
            </select>
            
            <select class="filter-select" id="priorityFilter">
                <option value="all">All Priority</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
            
            <select class="filter-select" id="projectFilter">
                <option value="all">All Projects</option>
                <option value="OCMI">OCMI</option>
                <option value="WORK">WORK</option>
                <option value="PERSONAL">PERSONAL</option>
            </select>
            
            
            <select class="filter-select" id="machineFilter">
                <option value="all">All Machines</option>
                <option value="hub">Cluster Hub</option>
                <option value="x2-nuc">x2-nuc (EVO-X2)</option>
                <option value="iota">iota</option>
                <option value="drone">drone</option>
                <option value="pup2-1">pup2-1</option>
            </select>
            <button class="btn btn-primary" onclick="openModal()">+ New Task</button>
            <button class="btn" onclick="exportTasks()">📤 Export</button>
            <button class="btn" onclick="refreshTasks()">🔄 Refresh</button>
        </div>
        
        <!-- Task List -->
        <div class="task-list" id="taskList">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <p>No tasks found</p>
            </div>
        </div>
    </div>
    
    <!-- New Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h3>Create New Task</h3>
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="taskTitle" placeholder="Task title">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="taskDescription" placeholder="Task description"></textarea>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="form-group">
                <label>Project</label>
                <select id="taskProject">
                    <option value="OCMI" selected>OCMI</option>
                    <option value="WORK">WORK</option>
                    <option value="PERSONAL">PERSONAL</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Target Machine</label>
                <select id="taskMachine">
                    <option value="all">All Machines</option>
                    <option value="hub">Cluster Hub Only</option>
                    <option value="x2-nuc">x2-nuc (EVO-X2)</option>
                    <option value="iota">iota</option>
                    <option value="drone">drone</option>
                </select>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createTask()">Create Task</button>
            </div>
        </div>
    </div>
    
    <script>
        // Sample tasks - in production, fetch from API
        let tasks = [
            { id: 'TASK-0001', title: 'Implement OCMI settings', description: 'Create settings module', status: 'in_progress', priority: 'high', project: 'OCMI', machine: 'hub', created: '2026-03-12' },
            { id: 'TASK-0002', title: 'Build sync module', description: 'Cluster Hub sync', status: 'open', priority: 'high', project: 'OCMI', machine: 'hub', created: '2026-03-12' },
            { id: 'TASK-0003', title: 'Enhance dashboard', description: 'Filters, search, export', status: 'open', priority: 'medium', project: 'OCMI', machine: 'hub', created: '2026-03-12' },
            { id: 'TASK-0004', title: 'Setup Oracle mode', description: 'Local model reviews', status: 'open', priority: 'medium', project: 'OCMI', machine: 'hub', created: '2026-03-12' },
            { id: 'TASK-0005', title: 'Weekly review', description: 'Review progress', status: 'completed', priority: 'low', project: 'OCMI', created: '2026-03-11' },
        ];
        
        let filteredTasks = [...tasks];
        
        function renderTasks() {
            const list = document.getElementById('taskList');
            
            if (filteredTasks.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>No tasks found</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filteredTasks.map(task => `
                <div class="task-item ${task.status === 'completed' ? 'completed' : ''}" data-id="${task.id}">
                    <input type="checkbox" class="task-checkbox" 
                           ${task.status === 'completed' ? 'checked' : ''}
                           onchange="toggleTask('${task.id}')">
                    <span class="task-priority priority-${task.priority}">${task.priority}</span>
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">
                            ${task.id} • ${task.project} • ${task.machine || "hub"} • ${task.created}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn" onclick="editTask('${task.id}')">✏️</button>
                        <button class="action-btn" onclick="deleteTask('${task.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('openTasks').textContent = tasks.filter(t => t.status === 'open').length;
            document.getElementById('inProgressTasks').textContent = tasks.filter(t => t.status === 'in_progress').length;
            document.getElementById('completedTasks').textContent = tasks.filter(t => t.status === 'completed').length;
        }
        
        function filterTasks() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const priority = document.getElementById('priorityFilter').value;
            const project = document.getElementById('projectFilter').value;
            
            filteredTasks = tasks.filter(task => {
                const matchSearch = task.title.toLowerCase().includes(search) || 
                                   task.description.toLowerCase().includes(search);
                const matchStatus = status === 'all' || task.status === status;
                const matchPriority = priority === 'all' || task.priority === priority;
                
            const machine = document.getElementById('machineFilter').value;
            const matchMachine = machine === 'all' || task.machine === machine || (machine === 'hub' && task.machine === 'hub');
                const matchProject = project === 'all' || task.project === project;
                
                return matchSearch && matchStatus && matchPriority && matchProject && matchMachine;
            });
            
            renderTasks();
        }
        
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = task.status === 'completed' ? 'open' : 'completed';
                filterTasks();
            }
        }
        
        function deleteTask(id) {
            if (confirm('Delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                filterTasks();
            }
        }
        
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDescription').value = task.description;
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('taskProject').value = task.project;
                document.getElementById('taskModal').classList.add('active');
            }
        }
        
        function openModal() {
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDescription').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskProject').value = 'OCMI';
            document.getElementById('taskModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }
        
        function createTask() {
            const title = document.getElementById('taskTitle').value;
            if (!title) return alert('Title required');
            
            const newTask = {
                id: `TASK-${String(tasks.length + 1).padStart(4, '0')}`,
                title: title,
                description: document.getElementById('taskDescription').value,
                status: 'open',
                priority: document.getElementById('taskPriority').value,
                project: document.getElementById('taskProject').value,
                machine: document.getElementById('taskMachine').value || 'all',
                created: new Date().toISOString().split('T')[0]
            };
            
            tasks.unshift(newTask);
            closeModal();
            filterTasks();
        }
        
        function exportTasks() {
            const data = JSON.stringify(tasks, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ocmi-tasks.json';
            a.click();
        }
        
        function refreshTasks() {
            // In production, fetch from API
            renderTasks();
        }
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterTasks);
        document.getElementById('statusFilter').addEventListener('change', filterTasks);
        document.getElementById('priorityFilter').addEventListener('change', filterTasks);
        document.getElementById('projectFilter').addEventListener('change', filterTasks);
        
        // Initial render
        renderTasks();
    </script>
</body>
</html>
