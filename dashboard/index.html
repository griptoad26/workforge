<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seele Hub - Cluster Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #8b5cf6; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(139,92,246,0.3); border-radius: 12px; padding: 20px; }
    .card h2 { color: #a78bfa; font-size: 1.1rem; margin-bottom: 12px; border-bottom: 1px solid #2d2d4a; padding-bottom: 8px; }
    .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a2e; }
    .stat:last-child { border-bottom: none; }
    .stat-label { color: #9ca3af; }
    .stat-value { color: #34d399; font-weight: 600; }
    .agent { padding: 10px; margin: 8px 0; background: #1a1a2e; border-radius: 8px; }
    .agent-name { color: #e0e0e0; font-weight: 500; }
    .agent-status { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 0.85rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.online { background: #34d399; }
    .dot.offline { background: #6b7280; }
    .loading { color: #9ca3af; text-align: center; padding: 40px; }
    .error { color: #ef4444; padding: 20px; text-align: center; }
    footer { text-align: center; margin-top: 40px; color: #6b7280; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Seele Hub</h1>
    <div id="app" class="loading">Loading cluster status...</div>
    <footer>Seele Agency - AI Workflow Platform</footer>
  </div>
  
  <script>
    const API_BASE = 'https://100.112.11.35:8090';
    
    async function fetchStatus() {
      try {
        // Try direct API call
        const resp = await fetch(API_BASE + '/api/status');
        if (resp.ok) {
          const data = await resp.json();
          renderDashboard(data);
        } else {
          renderOffline();
        }
      } catch (e) {
        renderOffline();
      }
    }
    
    function renderDashboard(data) {
      document.getElementById('app').innerHTML = `
        <div class="grid">
          <div class="card">
            <h2>System Status</h2>
            <div class="stat"><span class="stat-label">Total Agents</span><span class="stat-value">${data.total_agents || 0}</span></div>
            <div class="stat"><span class="stat-label">Active</span><span class="stat-value">${data.active_agents || 0}</span></div>
            <div class="stat"><span class="stat-label">Tasks</span><span class="stat-value">${data.total_tasks || 0}</span></div>
            <div class="stat"><span class="stat-label">Clusters</span><span class="stat-value">${data.clusters || 0}</span></div>
          </div>
          <div class="card">
            <h2>Cluster Hub</h2>
            <div class="stat"><span class="stat-label">Uptime</span><span class="stat-value">${data.uptime || 'N/A'}</span></div>
            <div class="stat"><span class="stat-label">Memory</span><span class="stat-value">${data.memory || 'N/A'}</span></div>
            <div class="stat"><span class="stat-label">Last Sync</span><span class="stat-value">${data.last_sync || 'N/A'}</span></div>
          </div>
          <div class="card">
            <h2>Quick Access</h2>
            <div style="padding: 10px 0;">
              <a href="https://seele.agency" style="color:#8b5cf6;display:block;padding:8px 0;">Downloads →</a>
              <a href="https://github.com/griptoad26" style="color:#8b5cf6;display:block;padding:8px 0;">GitHub →</a>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderOffline() {
      document.getElementById('app').innerHTML = `
        <div class="grid">
          <div class="card">
            <h2>Seele Hub</h2>
            <p style="color:#9ca3af;padding:20px 0;">Cluster Hub dashboard</p>
            <p style="color:#6b7280;font-size:0.9rem;">The live dashboard is accessible from the internal network. This static version shows general information.</p>
          </div>
          <div class="card">
            <h2>Quick Access</h2>
            <div style="padding: 10px 0;">
              <a href="https://seele.agency" style="color:#8b5cf6;display:block;padding:8px 0;">Downloads →</a>
              <a href="https://github.com/griptoad26" style="color:#8b5cf6;display:block;padding:8px 0;">GitHub →</a>
            </div>
          </div>
        </div>
      `;
    }
    
    fetchStatus();
  </script>
</body>
</html>
