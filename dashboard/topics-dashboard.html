<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topics Tree - Cluster Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 {
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.9rem; }
        
        /* Nav */
        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .nav-btn:hover {
            background: rgba(0,212,255,0.1);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        .nav-btn.active {
            background: rgba(0,212,255,0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        /* Delegation Panel */
        .delegation-panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .delegation-panel h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .delegation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .delegation-section {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
        }
        
        .delegation-section h4 {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .node-select {
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 12px;
            color: #eee;
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .delegate-btn {
            background: #6366f1;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        
        .delegate-btn:hover {
            background: #7c7ff7;
        }
        
        .delegate-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }
        
        .delegated-task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        
        .delegated-task .task-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
        }
        
        .delegated-task .node-badge {
            background: #6366f1;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        
        .delegated-task .status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
        
        .status-badge.delegated { background: #f59e0b; }
        .status-badge.in_progress { background: #3b82f6; }
        .status-badge.completed { background: #22c55e; }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label { color: #888; font-size: 0.8rem; }
        
        .stat-card.total { border-color: #00d4ff; }
        .stat-card.completed { border-color: #00ff88; }
        .stat-card.pending { border-color: #888; }
        
        /* Project Stats */
        .project-stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        
        .project-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .project-stat .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .project-stat .badge.hub { background: #6366f1; }
        .project-stat .badge.ocmi { background: #22c55e; }
        .project-stat .badge.agency { background: #f59e0b; }
        .project-stat .badge.test { background: #ef4444; }
        .project-stat .badge.auto { background: #8b5cf6; }
        
        .project-stat .count { color: #00d4ff; font-weight: bold; }
        .project-stat .count.done { color: #00ff88; }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 8px 20px;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: rgba(0,212,255,0.1);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        .filter-btn.active {
            background: rgba(0,212,255,0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        /* Projects */
        .project {
            margin-bottom: 20px;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
        }
        
        .project-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .project-header:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .project-header .left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .project-header .toggle {
            font-size: 1.2rem;
            color: #888;
            transition: transform 0.2s;
        }
        
        .project.collapsed .toggle {
            transform: rotate(-90deg);
        }
        
        .project.collapsed .project-content {
            display: none;
        }
        
        .project-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .project-badge.hub { background: #6366f1; }
        .project-badge.ocmi { background: #22c55e; }
        .project-badge.agency { background: #f59e0b; }
        .project-badge.test { background: #ef4444; }
        .project-badge.auto { background: #8b5cf6; }
        
        .project-header .title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .project-header .count {
            color: #888;
            font-size: 0.9rem;
        }
        
        /* Categories */
        .category {
            border-top: 1px solid #333;
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            font-size: 0.95rem;
            color: #aaa;
            transition: background 0.2s;
        }
        
        .category-header:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .category-header .toggle {
            font-size: 0.9rem;
            color: #666;
            transition: transform 0.2s;
        }
        
        .category.collapsed .toggle {
            transform: rotate(-90deg);
        }
        
        .category.collapsed .category-content {
            display: none;
        }
        
        /* Tasks */
        .tasks-list {
            padding: 10px 20px 15px 45px;
        }
        
        .task {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        
        .task:hover {
            background: rgba(255,255,255,0.06);
            border-color: #444;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #00ff88;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .task-content {
            flex: 1;
            min-width: 0;
        }
        
        .task-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        
        .task-id {
            font-size: 0.75rem;
            color: #666;
            font-family: monospace;
        }
        
        .task-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: #ddd;
        }
        
        .task-status {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .task-status.pending { background: #444; color: #aaa; }
        .task-status.in-progress { background: #f59e0b; color: #000; }
        .task-status.completed { background: #00ff88; color: #000; }
        
        .task-description {
            font-size: 0.85rem;
            color: #777;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .task.completed .task-title {
            text-decoration: line-through;
            color: #666;
        }
        
        .task.completed .task-status {
            background: #00ff88;
            color: #000;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 20px;
            color: #ef4444;
            background: rgba(239,68,68,0.1);
            border-radius: 8px;
            margin: 20px;
        }
        
        /* Auto-refresh indicator */
        .refresh-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 15px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #333;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-indicator .dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 1.5rem; }
            .stats { grid-template-columns: repeat(3, 1fr); }
            .stat-value { font-size: 1.4rem; }
            .project-stats { gap: 5px; }
            .project-stat { padding: 6px 10px; font-size: 0.75rem; }
            .project-header { padding: 12px 15px; }
            .project-header .title { font-size: 1rem; }
            .tasks-list { padding: 10px 15px 15px 30px; }
            .task { padding: 10px; }
            .task-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Topics Tree</h1>
        <p class="subtitle">Task Overview by Project & Category</p>
        
        <div class="nav">
            <a href="command-center.html" class="nav-btn">← Command Center</a>
            <a href="master-dashboard.html" class="nav-btn">Master Dashboard</a>
            <a href="mission-control.html" class="nav-btn">Mission Control</a>
        </div>
        
        <div id="stats" class="stats">
            <div class="stat-card total">
                <div class="stat-value" id="totalTasks">-</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card completed">
                <div class="stat-value" id="completedTasks">-</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-value" id="pendingTasks">-</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
        
        <div id="projectStats" class="project-stats"></div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        
        <div class="delegation-panel">
            <h3>📋 Task Delegation</h3>
            <div class="delegation-grid">
                <div class="delegation-section">
                    <h4>Unassigned Tasks</h4>
                    <select id="unassignedTasks" class="node-select" multiple style="height: 100px;"></select>
                    <select id="delegateToNode" class="node-select">
                        <option value="">Select NUC...</option>
                        <option value="x2-nuc">x2-nuc</option>
                        <option value="t1-nuc">t1-nuc</option>
                        <option value="win-20o3">win-20o3</option>
                        <option value="drone">drone</option>
                        <option value="iota">iota</option>
                        <option value="molty-botz">molty-botz</option>
                        <option value="pup2-1">pup2-1</option>
                        <option value="yolo">yolo</option>
                    </select>
                    <button id="delegateBtn" class="delegate-btn">Delegate Selected</button>
                </div>
                <div class="delegation-section">
                    <h4>Delegated Tasks by NUC</h4>
                    <div id="delegatedTasksByNode"></div>
                </div>
            </div>
        </div>
        
        <div id="projectsContainer"></div>
        
        <div id="loading" class="loading">Loading tasks...</div>
        <div id="error" class="error" style="display:none;"></div>
    </div>
    
    <div class="refresh-indicator">
        <span class="dot"></span>
        <span>Auto-refresh: 30s</span>
    </div>

    <script>
        const API_BASE = '';
        let allTasks = [];
        let currentFilter = 'all';
        let refreshInterval;
        
        // Project colors
        const PROJECT_CONFIG = {
            'HUB': { name: 'HUB', class: 'hub' },
            'OCMI': { name: 'OCMI', class: 'ocmi' },
            'AGENCY': { name: 'AGENCY', class: 'agency' },
            'TEST': { name: 'TEST', class: 'test' },
            'AUTO': { name: 'AUTO', class: 'auto' }
        };
        
        // Default project for tasks without project field
        const DEFAULT_PROJECT = 'HUB';
        
        async function fetchTasks() {
            try {
                const response = await fetch(`${API_BASE}/api/tasks`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data.tasks || [];
            } catch (error) {
                console.error('Failed to fetch tasks:', error);
                throw error;
            }
        }
        
        // Delegation functions
        async function delegateTask(taskId, nodeId) {
            try {
                const response = await fetch(`${API_BASE}/api/delegation/delegate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId, assign_to: nodeId })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Failed to delegate task:', error);
                throw error;
            }
        }
        
        async function claimTask(taskId, nodeId) {
            try {
                const response = await fetch(`${API_BASE}/api/delegation/claim`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId, node_id: nodeId })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Failed to claim task:', error);
                throw error;
            }
        }
        
        async function completeDelegatedTask(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/delegation/complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Failed to complete task:', error);
                throw error;
            }
        }
        
        async function fetchDelegationNodes() {
            try {
                const response = await fetch(`${API_BASE}/api/delegation/nodes`);
                const data = await response.json();
                return data.nodes || [];
            } catch (error) {
                console.error('Failed to fetch nodes:', error);
                return ['x2-nuc', 't1-nuc', 'win-20o3', 'drone', 'iota', 'molty-botz', 'pup2-1', 'yolo'];
            }
        }
        
        function updateDelegationPanel(tasks) {
            // Update unassigned tasks list
            const unassignedSelect = document.getElementById('unassignedTasks');
            const unassignedTasks = tasks.filter(t => !t.assign_to && t.status !== 'completed');
            
            unassignedSelect.innerHTML = unassignedTasks.map(t => 
                `<option value="${t.id}">${t.id}: ${t.title || 'Untitled'}</option>`
            ).join('');
            
            // Update delegated tasks by node
            const delegatedByNode = document.getElementById('delegatedTasksByNode');
            const nodes = ['x2-nuc', 't1-nuc', 'win-20o3', 'drone', 'iota', 'molty-botz', 'pup2-1', 'yolo'];
            let html = '';
            
            nodes.forEach(node => {
                const nodeTasks = tasks.filter(t => t.assign_to === node || t.claimed_by === node);
                if (nodeTasks.length > 0) {
                    html += `<div style="margin-bottom: 15px;">
                        <div class="node-badge" style="background: #6366f1; display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 8px;">${node}</div>`;
                    nodeTasks.forEach(t => {
                        html += `<div class="delegated-task">
                            <span class="task-title">${t.id}: ${t.title || 'Untitled'}</span>
                            <span class="status-badge ${t.status}">${t.status}</span>
                        </div>`;
                    });
                    html += '</div>';
                }
            });
            
            if (!html) {
                html = '<div style="color: #666; font-size: 0.85rem; text-align: center; padding: 20px;">No delegated tasks</div>';
            }
            
            delegatedByNode.innerHTML = html;
        }
        
        // Setup delegation button handler
        function setupDelegationHandlers() {
            const delegateBtn = document.getElementById('delegateBtn');
            delegateBtn.addEventListener('click', async () => {
                const unassignedSelect = document.getElementById('unassignedTasks');
                const nodeSelect = document.getElementById('delegateToNode');
                const selectedTask = unassignedSelect.value;
                const selectedNode = nodeSelect.value;
                
                if (!selectedTask) {
                    alert('Please select a task to delegate');
                    return;
                }
                if (!selectedNode) {
                    alert('Please select a NUC');
                    return;
                }
                
                try {
                    await delegateTask(selectedTask, selectedNode);
                    alert(`Task delegated to ${selectedNode}`);
                    loadTasks(); // Refresh
                } catch (error) {
                    alert('Failed to delegate task: ' + error.message);
                }
            });
        }
        
        async function updateTaskStatus(taskId, newStatus) {
            try {
                const response = await fetch(`${API_BASE}/api/tasks/${taskId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Failed to update task:', error);
                throw error;
            }
        }
        
        function getProject(task) {
            return task.project || task.project_name || DEFAULT_PROJECT;
        }
        
        function getCategory(task) {
            return task.category || task.cat || 'general';
        }
        
        function groupTasks(tasks) {
            const groups = {};
            
            tasks.forEach(task => {
                const project = getProject(task);
                const category = getCategory(task);
                
                if (!groups[project]) {
                    groups[project] = {};
                }
                if (!groups[project][category]) {
                    groups[project][category] = [];
                }
                groups[project][category].push(task);
            });
            
            return groups;
        }
        
        function updateStats(tasks) {
            const total = tasks.length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            const pending = tasks.filter(t => t.status !== 'completed').length;
            
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
            
            // Project stats
            const projectCounts = {};
            tasks.forEach(task => {
                const project = getProject(task);
                if (!projectCounts[project]) {
                    projectCounts[project] = { total: 0, completed: 0 };
                }
                projectCounts[project].total++;
                if (task.status === 'completed') {
                    projectCounts[project].completed++;
                }
            });
            
            const statsHtml = Object.entries(projectCounts).map(([project, counts]) => {
                const config = PROJECT_CONFIG[project] || { name: project, class: 'hub' };
                return `
                    <div class="project-stat">
                        <span class="badge ${config.class}">${config.name}</span>
                        <span class="count">${counts.completed}/${counts.total}</span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('projectStats').innerHTML = statsHtml;
        }
        
        function renderProjects(groups) {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = '';
            
            // Sort projects by predefined order
            const projectOrder = ['HUB', 'OCMI', 'AGENCY', 'TEST', 'AUTO'];
            const sortedProjects = Object.keys(groups).sort((a, b) => {
                const aIdx = projectOrder.indexOf(a);
                const bIdx = projectOrder.indexOf(b);
                return (aIdx === -1 ? 99 : aIdx) - (bIdx === -1 ? 99 : bIdx);
            });
            
            sortedProjects.forEach(project => {
                const categories = groups[project];
                const config = PROJECT_CONFIG[project] || { name: project, class: 'hub' };
                
                // Count tasks in project
                let projectTaskCount = 0;
                Object.values(categories).forEach(tasks => {
                    tasks.forEach(t => {
                        if (currentFilter === 'all' || 
                            (currentFilter === 'completed' && t.status === 'completed') ||
                            (currentFilter === 'pending' && t.status !== 'completed')) {
                            projectTaskCount++;
                        }
                    });
                });
                
                if (projectTaskCount === 0) return; // Skip empty projects
                
                const projectEl = document.createElement('div');
                projectEl.className = 'project';
                projectEl.innerHTML = `
                    <div class="project-header" onclick="toggleProject(this)">
                        <div class="left">
                            <span class="toggle">▼</span>
                            <span class="project-badge ${config.class}">${config.name}</span>
                            <span class="title">${config.name}</span>
                        </div>
                        <span class="count">${projectTaskCount} tasks</span>
                    </div>
                    <div class="project-content">
                        ${renderCategories(project, categories)}
                    </div>
                `;
                container.appendChild(projectEl);
            });
            
            if (container.children.length === 0) {
                container.innerHTML = '<div class="loading">No tasks match the current filter</div>';
            }
        }
        
        function renderCategories(project, categories) {
            const categoryOrder = ['development', 'general', 'ui', 'api', 'testing', 'deployment', 'documentation'];
            
            return Object.entries(categories)
                .sort((a, b) => {
                    const aIdx = categoryOrder.indexOf(a[0]);
                    const bIdx = categoryOrder.indexOf(b[0]);
                    return (aIdx === -1 ? 99 : aIdx) - (bIdx === -1 ? 99 : bIdx);
                })
                .map(([category, tasks]) => {
                    // Filter tasks
                    const filteredTasks = tasks.filter(t => 
                        currentFilter === 'all' || 
                        (currentFilter === 'completed' && t.status === 'completed') ||
                        (currentFilter === 'pending' && t.status !== 'completed')
                    );
                    
                    if (filteredTasks.length === 0) return '';
                    
                    const categoryName = category.charAt(0).toUpperCase() + category.slice(1);
                    
                    return `
                        <div class="category">
                            <div class="category-header" onclick="toggleCategory(this)">
                                <span class="toggle">▼</span>
                                <span>${categoryName}</span>
                                <span style="color:#666;font-size:0.8rem;">(${filteredTasks.length})</span>
                            </div>
                            <div class="category-content">
                                <div class="tasks-list">
                                    ${filteredTasks.map(task => renderTask(task)).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
        }
        
        function renderTask(task) {
            const isCompleted = task.status === 'completed';
            const statusClass = task.status === 'in-progress' ? 'in-progress' : 
                               task.status === 'completed' ? 'completed' : 'pending';
            const description = task.description || '';
            
            return `
                <div class="task ${isCompleted ? 'completed' : ''}" data-task-id="${task.id}">
                    <input type="checkbox" class="task-checkbox" 
                        ${isCompleted ? 'checked' : ''} 
                        onchange="toggleTask('${task.id}', this.checked)">
                    <div class="task-content">
                        <div class="task-header">
                            <span class="task-id">${task.id}</span>
                            <span class="task-title">${escapeHtml(task.title)}</span>
                            <span class="task-status ${statusClass}">${task.status}</span>
                        </div>
                        ${description ? `<div class="task-description">${escapeHtml(description)}</div>` : ''}
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleProject(header) {
            header.parentElement.classList.toggle('collapsed');
        }
        
        function toggleCategory(header) {
            header.parentElement.classList.toggle('collapsed');
        }
        
        async function toggleTask(taskId, isChecked) {
            const newStatus = isChecked ? 'completed' : 'pending';
            
            // Optimistic update
            const taskEl = document.querySelector(`[data-task-id="${taskId}"]`);
            if (taskEl) {
                taskEl.classList.toggle('completed', isChecked);
                const statusEl = taskEl.querySelector('.task-status');
                if (statusEl) {
                    statusEl.textContent = newStatus;
                    statusEl.className = `task-status ${newStatus === 'completed' ? 'completed' : 'pending'}`;
                }
            }
            
            try {
                await updateTaskStatus(taskId, newStatus);
                // Update local data
                const task = allTasks.find(t => t.id === taskId);
                if (task) task.status = newStatus;
                updateStats(allTasks);
            } catch (error) {
                // Revert on error
                alert('Failed to update task status');
                // Refresh to get correct state
                loadTasks();
            }
        }
        
        async function loadTasks() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                
                allTasks = await fetchTasks();
                
                updateStats(allTasks);
                updateDelegationPanel(allTasks);
                
                const groups = groupTasks(allTasks);
                renderProjects(groups);
                
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Failed to load tasks: ${error.message}`;
            }
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                const groups = groupTasks(allTasks);
                renderProjects(groups);
            });
        });
        
        // Setup delegation handlers
        setupDelegationHandlers();
        
        // Initial load
        loadTasks();
        
        // Auto-refresh every 30 seconds
        refreshInterval = setInterval(loadTasks, 30000);
    </script>
</body>
</html>
