<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCMI Mission Control</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎛️</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #eee;
            font-size: 13px;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 220px;
            background: rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .sidebar-header h2 {
            font-size: 1rem;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .sidebar-section {
            margin-bottom: 5px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }
        
        .section-header:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .section-header span {
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
        
        .section-header .arrow {
            transition: transform 0.3s;
            color: #00d4ff;
        }
        
        .section-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        
        .section-items {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .section-items.collapsed {
            max-height: 0 !important;
        }
        
        .section-item {
            padding: 8px 15px 8px 30px;
            cursor: pointer;
            color: #888;
            transition: all 0.2s;
            font-size: 12px;
        }
        
        .section-item:hover {
            background: rgba(0,212,255,0.1);
            color: #00d4ff;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            font-size: 2rem;
        }
        
        .logo-text {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .clock {
            font-size: 1.1rem;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        .refresh-indicator {
            font-size: 11px;
            color: #666;
        }
        
        /* Dashboard Grid */
        .dashboard-grid {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .dashboard-tile {
            background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            cursor: grab;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .dashboard-tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .dashboard-tile:hover {
            transform: translateY(-3px);
            border-color: rgba(0,255,136,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .dashboard-tile:hover::before {
            opacity: 1;
        }
        
        .dashboard-tile.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
        
        .dashboard-tile.drag-over {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        
        .tile-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .tile-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
            word-break: break-word;
        }
        
        .tile-link {
            display: inline-block;
            margin-top: 10px;
            color: #00d4ff;
            text-decoration: none;
            font-size: 11px;
            transition: color 0.2s;
        }
        
        .tile-link:hover {
            color: #00ff88;
        }
        
        .tile-drag-handle {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #444;
            font-size: 1.2rem;
            cursor: grab;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎛️ OCMI</h2>
            </div>
            <div class="sidebar-content">
                <!-- Dashboards Section -->
                <div class="sidebar-section">
                    <div class="section-header" data-section="dashboards">
                        <span>📊 Dashboards</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="section-items" id="dashboards-items">
                        <div class="section-item" onclick="openDashboard('agency.html')">Agency</div>
                        <div class="section-item" onclick="openDashboard('architecture.html')">Architecture</div>
                        <div class="section-item" onclick="openDashboard('command-center.html')">Command Center</div>
                        <div class="section-item" onclick="openDashboard('links-dashboard.html')">Links</div>
                        <div class="section-item" onclick="openDashboard('live-dashboard.html')">Live</div>
                        <div class="section-item" onclick="openDashboard('master-dashboard.html')">Master</div>
                        <div class="section-item" onclick="openDashboard('ocmi-dashboard-enhanced.html')">OCMI Enhanced</div>
                    </div>
                </div>
                
                <!-- Tasks Section -->
                <div class="sidebar-section">
                    <div class="section-header" data-section="tasks">
                        <span>📋 Tasks</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="section-items" id="tasks-items">
                        <div class="section-item" onclick="openDashboard('deployment-guide.html')">Deployment Guide</div>
                        <div class="section-item" onclick="openDashboard('implementations-board.html')">Implementations</div>
                    </div>
                </div>
                
                <!-- Machines Section -->
                <div class="sidebar-section">
                    <div class="section-header" data-section="machines">
                        <span>🖥️ Machines</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="section-items" id="machines-items">
                        <div class="section-item">x2-nuc (local)</div>
                        <div class="section-item">gateway (remote)</div>
                    </div>
                </div>
                
                <!-- Settings Section -->
                <div class="sidebar-section">
                    <div class="section-header" data-section="settings">
                        <span>⚙️ Settings</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="section-items" id="settings-items">
                        <div class="section-item">Preferences</div>
                        <div class="section-item">Theme</div>
                        <div class="section-item">Refresh Rate</div>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="logo">
                        <span class="logo-icon">🎛️</span>
                        <span class="logo-text">Mission Control</span>
                    </div>
                </div>
                <div class="header-right">
                    <span class="refresh-indicator" id="refresh-indicator">Auto-refresh in 30s</span>
                    <span class="clock" id="clock">--:--:--</span>
                </div>
            </header>
            
            <!-- Dashboard Grid -->
            <div class="dashboard-grid">
                <div class="grid-container" id="dashboard-grid">
                    <!-- Tiles will be rendered by JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // Dashboard files configuration
        const dashboardFiles = [
            { name: 'agency.html', icon: '🏢', title: 'Agency' },
            { name: 'architecture.html', icon: '🏗️', title: 'Architecture' },
            { name: 'command-center.html', icon: '🎯', title: 'Command Center' },
            { name: 'deployment-guide.html', icon: '📖', title: 'Deployment Guide' },
            { name: 'implementations-board.html', icon: '📋', title: 'Implementations' },
            { name: 'links-dashboard.html', icon: '🔗', title: 'Links' },
            { name: 'live-dashboard.html', icon: '📡', title: 'Live' },
            { name: 'master-dashboard.html', icon: '🎛️', title: 'Master' },
            { name: 'ocmi-dashboard-enhanced.html', icon: '✨', title: 'OCMI Enhanced' }
        ];
        
        // State
        let tileOrder = JSON.parse(localStorage.getItem('tileOrder')) || dashboardFiles.map(d => d.name);
        let refreshCountdown = 30;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderDashboardTiles();
            initClock();
            initSidebar();
            initAutoRefresh();
            initDragAndDrop();
        });
        
        // Render dashboard tiles
        function renderDashboardTiles() {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';
            
            // Sort by saved order
            const sortedFiles = tileOrder.map(name => dashboardFiles.find(d => d.name === name) || { name, icon: '📄', title: name });
            
            sortedFiles.forEach((dash, index) => {
                const tile = document.createElement('div');
                tile.className = 'dashboard-tile';
                tile.draggable = true;
                tile.dataset.name = dash.name;
                tile.dataset.index = index;
                
                tile.innerHTML = `
                    <span class="tile-drag-handle">⋮⋮</span>
                    <div class="tile-icon">${dash.icon}</div>
                    <div class="tile-name">${dash.title}</div>
                    <a href="${dash.name}" class="tile-link" target="_blank">Open →</a>
                `;
                
                grid.appendChild(tile);
            });
            
            // Re-initialize drag and drop after rendering
            initDragAndDrop();
        }
        
        // Initialize clock
        function initClock() {
            updateClock();
            setInterval(updateClock, 1000);
        }
        
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('clock').textContent = time;
        }
        
        // Initialize sidebar collapse
        function initSidebar() {
            document.querySelectorAll('.section-header').forEach(header => {
                header.addEventListener('click', () => {
                    const section = header.dataset.section;
                    const items = document.getElementById(`${section}-items`);
                    header.classList.toggle('collapsed');
                    items.classList.toggle('collapsed');
                });
            });
        }
        
        // Auto-refresh
        function initAutoRefresh() {
            setInterval(() => {
                refreshCountdown--;
                if (refreshCountdown <= 0) {
                    refreshDashboard();
                    refreshCountdown = 30;
                }
                document.getElementById('refresh-indicator').textContent = `Auto-refresh in ${refreshCountdown}s`;
            }, 1000);
        }
        
        function refreshDashboard() {
            // Re-render tiles to check for any changes
            renderDashboardTiles();
            console.log('Dashboard refreshed');
        }
        
        // Drag and drop
        function initDragAndDrop() {
            const tiles = document.querySelectorAll('.dashboard-tile');
            const grid = document.getElementById('dashboard-grid');
            
            tiles.forEach(tile => {
                tile.addEventListener('dragstart', handleDragStart);
                tile.addEventListener('dragend', handleDragEnd);
                tile.addEventListener('dragover', handleDragOver);
                tile.addEventListener('dragenter', handleDragEnter);
                tile.addEventListener('dragleave', handleDragLeave);
                tile.addEventListener('drop', handleDrop);
            });
        }
        
        let draggedItem = null;
        
        function handleDragStart(e) {
            draggedItem = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.name);
        }
        
        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.dashboard-tile').forEach(t => t.classList.remove('drag-over'));
            draggedItem = null;
            
            // Save new order to localStorage
            const newOrder = Array.from(document.querySelectorAll('.dashboard-tile')).map(t => t.dataset.name);
            localStorage.setItem('tileOrder', JSON.stringify(newOrder));
            tileOrder = newOrder;
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        
        function handleDragEnter(e) {
            e.preventDefault();
            if (this !== draggedItem) {
                this.classList.add('drag-over');
            }
        }
        
        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }
        
        function handleDrop(e) {
            e.preventDefault();
            if (this === draggedItem) return;
            
            const grid = document.getElementById('dashboard-grid');
            const allTiles = Array.from(grid.querySelectorAll('.dashboard-tile'));
            const draggedIndex = allTiles.indexOf(draggedItem);
            const dropIndex = allTiles.indexOf(this);
            
            if (draggedIndex < dropIndex) {
                this.after(draggedItem);
            } else {
                this.before(draggedItem);
            }
        }
        
        // Open dashboard
        function openDashboard(filename) {
            window.open(filename, '_blank');
        }
    </script>
</body>
</html>
