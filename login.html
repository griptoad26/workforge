<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="auth-gate" content="off">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sign in to XKG Desktop — your local-first AI conversation knowledge graph.">
<meta property="og:title" content="Sign in — XKG Desktop | Seele Agency">
<meta property="og:description" content="Sign in to access your XKG Desktop downloads and account.">
<meta property="og:url" content="https://seele.agency/login.html">
<title>Sign in — XKG Desktop | Seele Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --bg4: #30363d;
    --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
    --accent: #8b5cf6; --accent-h: #a78bfa; --accent-d: #7c3aed;
    --success: #3fb950; --danger: #f85149; --warn: #d29922;
    --gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 50%, #3b82f6 100%);
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; line-height: 1.6; }
  body { min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
  a:hover { color: var(--accent-h); }

  /* ===== Layout ===== */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  nav { position: sticky; top: 0; background: rgba(13,17,23,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--bg4); z-index: 100; }
  nav .container { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; }
  .logo { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-mark { width: 28px; height: 28px; background: var(--gradient); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 14px; }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a { color: var(--text2); font-size: 14px; }
  .nav-links a:hover { color: var(--text); }

  /* ===== Auth card ===== */
  .auth-wrap { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 60px 24px; position: relative; overflow: hidden; }
  .auth-wrap::before { content: ''; position: absolute; top: -20%; left: 50%; transform: translateX(-50%); width: 80%; height: 60%; background: radial-gradient(ellipse, rgba(139,92,246,0.15) 0%, transparent 70%); pointer-events: none; }
  .auth-card { background: var(--bg2); border: 1px solid var(--bg4); border-radius: 16px; padding: 40px; max-width: 420px; width: 100%; position: relative; box-shadow: 0 30px 80px rgba(0,0,0,0.4); }
  .auth-card h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.01em; }
  .auth-card .sub { color: var(--text2); font-size: 15px; margin-bottom: 28px; }
  .auth-card label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; margin-top: 16px; }
  .auth-card input[type="email"], .auth-card input[type="password"], .auth-card input[type="text"] {
    width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--bg4);
    border-radius: 8px; color: var(--text); font-size: 15px; font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .auth-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.18); }
  .auth-card .row { display: flex; align-items: center; justify-content: space-between; margin: 18px 0 8px; }
  .auth-card .row label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); margin: 0; cursor: pointer; }
  .auth-card .row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .auth-card .btn-primary {
    width: 100%; background: var(--gradient); color: white; padding: 13px; border: none;
    border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 12px;
    transition: all 0.15s; font-family: inherit;
    box-shadow: 0 8px 24px rgba(139,92,246,0.25);
  }
  .auth-card .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(139,92,246,0.35); }
  .auth-card .btn-primary:active { transform: translateY(0); }
  .auth-card .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
  .auth-card .alt { text-align: center; margin-top: 22px; font-size: 14px; color: var(--text2); }
  .auth-card .alt a { font-weight: 600; }
  .auth-card .error {
    background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.4); color: #ff8b85;
    padding: 10px 14px; border-radius: 8px; font-size: 13.5px; margin-top: 14px; display: none;
  }
  .auth-card .error.show { display: block; }
  .auth-card .footer-note { color: var(--text3); font-size: 12px; text-align: center; margin-top: 18px; }
  .auth-card .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hide auth card until script decides (no flash of "login" if already signed in) */
  .auth-card.hidden-initially { visibility: hidden; }
</style>
</head>
<body>

<nav>
  <div class="container">
    <a href="/" class="logo"><span class="logo-mark">X</span> XKG Desktop</a>
    <div class="nav-links">
      <a href="/#features">Features</a>
      <a href="/downloads.html">Download</a>
      <a href="/#pricing">Pricing</a>
      <a href="/support.html">Support</a>
      <span id="navUser" style="display:none; font-size:13px; color: var(--text2);"></span>
      <a href="/register.html" class="nav-cta" id="navRegister" style="background: var(--accent); color: white !important; padding: 8px 16px; border-radius: 8px; font-weight: 600;">Register</a>
      <a href="#" id="navLogout" style="display:none; font-size:13px; color: var(--text2);" onclick="logout(event)">Sign out</a>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card hidden-initially" id="authCard">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to access downloads, your license, and account.</p>

    <form id="loginForm" novalidate>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">

      <div class="row">
        <label><input type="checkbox" id="remember" checked> Remember me for 30 days</label>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>

      <div class="error" id="errorBox"></div>
    </form>

    <div class="alt">
      Don't have an account? <a href="/register.html">Register here</a>
    </div>
    <div class="footer-note">
      Trouble signing in? Email <a href="mailto:support@seele.agency">support@seele.agency</a>.
    </div>
  </div>
</div>

<script src="/gate.js" data-mode="login"></script>
<script>
(function() {
  'use strict';
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('submitBtn');
  const errBox = document.getElementById('errorBox');
  const API = (window.SEELE_AUTH && window.SEELE_AUTH.apiBase) || '/api/pay';

  function getNext() {
    const params = new URLSearchParams(window.location.search);
    let next = params.get('next') || '/downloads.html';
    // Only allow relative paths (avoid open redirect)
    if (!next.startsWith('/') || next.startsWith('//')) next = '/downloads.html';
    return next;
  }

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');
  }
  function clearError() {
    errBox.classList.remove('show');
    errBox.textContent = '';
  }
  function setBusy(busy) {
    btn.disabled = busy;
    btn.innerHTML = busy ? '<span class="spinner"></span>Signing in…' : 'Sign in';
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    if (!email || !password) { showError('Please enter your email and password.'); return; }
    setBusy(true);
    try {
      const r = await fetch(API + '/v1/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password, remember_me: remember })
      });
      if (r.ok) {
        // Cookie is set by server. Redirect to originally-requested page.
        window.location.href = getNext();
        return;
      }
      let msg = 'Sign-in failed. Please try again.';
      try {
        const data = await r.json();
        if (data && data.detail) {
          if (typeof data.detail === 'string') msg = data.detail;
          else if (Array.isArray(data.detail) && data.detail[0] && data.detail[0].msg) msg = data.detail[0].msg;
        }
      } catch (_) { /* non-JSON body */ }
      if (r.status === 401) msg = 'Invalid email or password.';
      if (r.status === 0 || r.status === 502 || r.status === 503) msg = 'Sign-in service unavailable. Please try again in a moment.';
      showError(msg);
    } catch (err) {
      showError('Network error. Check your connection and try again.');
    } finally {
      setBusy(false);
    }
  });

  async function logout(ev) {
    ev.preventDefault();
    try {
      await fetch(API + '/v1/auth/logout', { method: 'POST', credentials: 'include' });
    } catch (_) {}
    window.location.href = '/login.html';
  }
  window.logout = logout;

  // Show auth card once gate.js has decided we should see it
  function reveal() {
    document.getElementById('authCard').classList.remove('hidden-initially');
  }
  // Show after a short delay — fallback reveal in case gate.js doesn't unhide
  setTimeout(reveal, 800);
  document.addEventListener('seele:gate:show', reveal);
})();
</script>

</body>
</html>
