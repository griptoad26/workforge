<!DOCTYPE html>
<html>
<head>
  <title>Seele Agency - Login Required</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%); color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { text-align: center; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(139,92,246,0.3); max-width: 400px; width: 90%; }
    h1 { color: #8b5cf6; margin-bottom: 20px; font-size: 2rem; }
    p { color: #9ca3af; margin-bottom: 30px; }
    input { width: 100%; padding: 14px; font-size: 16px; border: 1px solid rgba(139,92,246,0.5); border-radius: 8px; background: rgba(255,255,255,0.1); color: white; margin-bottom: 16px; }
    input::placeholder { color: #6b7280; }
    button { width: 100%; background: #8b5cf6; color: white; padding: 14px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #7c3aed; }
    .error { color: #ef4444; margin-top: 16px; display: none; }
    .success { display: none; text-align: center; }
    .success iframe { width: 100%; height: 90vh; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="login-container" id="login-box">
    <h1>Seele Agency</h1>
    <p>Enter password to access</p>
    <input type="password" id="password" placeholder="Enter password" onkeypress="if(event.key==='Enter')checkPwd()" />
    <button onclick="checkPwd()">Access</button>
    <p class="error" id="error">Incorrect password. Try again.</p>
  </div>
  
  <div class="login-container success" id="content-box">
    <iframe src="https://griptoad26.github.io/workforge/" title="Seele Hub"></iframe>
  </div>

  <script>
    const PASSWORD = 'tabmind2026';
    
    function checkPwd() {
      const pwd = document.getElementById('password').value;
      if (pwd === PASSWORD) {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('content-box').style.display = 'block';
      } else {
        document.getElementById('error').style.display = 'block';
        document.getElementById('password').value = '';
      }
    }
  </script>
</body>
</html>
